<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simuladores Web</title>

    <!-- CSS -->
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="container">
    <h1>Simuladores Matemáticos</h1>
    <div class="card">
        <h2>Ley de Enfriamiento</h2>

        <form>
            <label>T0 (Temperatura inicial):</label>
            <input type="number" id="t0" value="120">

            <label>Ts (Temperatura ambiente):</label>
            <input type="number" id="ts" value="38">

            <label>k (Constante):</label>
            <input type="number" step="any" id="k" value="0.45">

            <label>t (Tiempo horas):</label>
            <input type="number" id="t" value="3">

            <button type="button" onclick="calcularEnfriamiento()">Calcular</button>
        </form>

        <p class="resultado" id="resultado1"></p>
    </div>
    <div class="card">
        <h2>Combinaciones</h2>

        <form>
            <label>n1:</label>
            <input type="number" id="n1" value="59">

            <label>r1:</label>
            <input type="number" id="r1" value="5">

            <label>n2:</label>
            <input type="number" id="n2" value="35">

            <label>r2:</label>
            <input type="number" id="r2" value="1">

            <button type="button" onclick="calcularCombinaciones()">Calcular</button>
        </form>

        <p class="resultado" id="resultado2"></p>
    </div>
</div>
<script src="jasc.js"></script>

</body>
</html>
